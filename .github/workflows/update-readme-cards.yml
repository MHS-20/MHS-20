name: Update README cards

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab

jobs:
  update-cards:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 generate_cards.py MHS-20 \
            ElkDB ScalarPath Hyperion Prism \
            Astra Choir \
            Squid-Storage Camelia Poseidon Zodiac \
            Raft Kademlia WebSocket \
            FOOL-Compiler Tape LambdaCalculus ScaLog

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cards/
          git diff --quiet --cached || git commit -m "chore: refresh readme cards"
          git push
